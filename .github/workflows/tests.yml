# Test del motore (JS + Python) a ogni push che tocca codice — NON blocca gli
# aggiornamenti dati (quello è update-data.yml col suo audit_data.py).
name: tests
on:
  push:
    branches: [main]
    paths: ["assets/**", "scripts/**", "index.html", ".github/workflows/tests.yml"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Sintassi + test motore JS (vm, DOM-stub)
        run: |
          node --check assets/app.js
          node scripts/test_app.mjs

      # RED TEAM (v116, gate HARD): invarianti finanziari su tutte le combinazioni di
      # stato UI × scenari di dati avvelenati. Codice che può produrre un ordine
      # impossibile (incidente SNDK: limite $40,1 / stop -$366) NON si pusha.
      - name: Red team invarianti motore
        run: node scripts/redteam.mjs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - name: Test funzioni pure pipeline (offline)
        run: python scripts/test_update_data.py
