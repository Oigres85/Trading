name: Aggiorna dati dashboard

on:
  schedule:
    # Orari Italia richiesti: 06:00 · 09:55 · 15:25 · 17:00 · 21:55 (ogni giorno).
    # GitHub usa UTC: includo sia CEST (estate, UTC+2) sia CET (inverno, UTC+1)
    # così l'orario locale è corretto tutto l'anno (eventuale refresh extra è innocuo).
    - cron: "0 4 * * *"     # 06:00 CEST
    - cron: "0 5 * * *"     # 06:00 CET
    - cron: "55 7 * * *"    # 09:55 CEST
    - cron: "55 8 * * *"    # 09:55 CET
    - cron: "25 13 * * *"   # 15:25 CEST
    - cron: "25 14 * * *"   # 15:25 CET
    - cron: "0 15 * * *"    # 17:00 CEST
    - cron: "0 16 * * *"    # 17:00 CET
    - cron: "55 19 * * *"   # 21:55 CEST
    - cron: "55 20 * * *"   # 21:55 CET
    # Aggiornamento ORARIO durante la sessione USA nei giorni feriali (dati sempre freschi):
    # 13:00–21:00 UTC = 15:00–23:00 CEST (copre pre-market e tutta la seduta di Wall Street).
    - cron: "0 13-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  issues: write        # fallback notifiche: GitHub Issue quando WhatsApp/SMTP non configurati

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - run: python scripts/update_data.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # opzionale: backup prezzi se Yahoo fallisce (registrazione gratuita su tiingo.com)
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}

      # gate di qualità: violazioni matematiche hard (P/E con EPS<0, MCR rotto, stop
      # incoerenti) bloccano il commit dei dati; i degradi di mercato sono solo warning
      - run: python scripts/audit_data.py data/data.json

      # registro verdetti→esiti (v113): logga i candidati del motore e inietta il track
      # record in data.json. BEST-EFFORT: exit 0 sempre + continue-on-error, non deve
      # MAI bloccare il commit dei dati.
      - name: Log verdetti e track record
        run: node scripts/log_verdict.mjs
        continue-on-error: true

      # RED TEAM sui DATI FRESCHI (v116): gli invarianti finanziari del motore vengono
      # verificati su tutte le combinazioni di stato UI PRIMA del commit. Un fallimento
      # qui NON blocca i dati (il bug sarebbe nel codice, non nei prezzi) ma fa scattare
      # l'allarme WhatsApp: mai più scoprire un limite d'ordine folle leggendo il report.
      - name: Red team invarianti motore (dati freschi)
        id: redteam
        run: node scripts/redteam.mjs
        continue-on-error: true
      - name: Allarme red team
        if: steps.redteam.outcome == 'failure'
        # block scalar (>-): il messaggio contiene ": " che in uno scalare YAML piano
        # invalida il file (successo il 11/07: workflow rotto = dati fermi una notte)
        run: >-
          python scripts/notify_alerts.py --custom
          "RED TEAM FALLITO sul run dati — il motore ha violato gli invarianti
          finanziari con i dati freschi. NON usare il report finché non controlli
          la tab Actions."
        continue-on-error: true
        env:
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          GITHUB_TOKEN: ${{ github.token }}

      # notifiche alert (v113): stop violati / data quality / setup squeeze. Canali:
      # WhatsApp CallMeBot → email SMTP → GitHub Issue (fallback senza secret).
      # ANTI-FRAGILE: lo script esce sempre 0; continue-on-error come seconda cintura.
      - name: Notifiche alert (best-effort)
        run: python scripts/notify_alerts.py
        continue-on-error: true
        env:
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit dati aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # file di stato best-effort: possono non esistere ai primi run
          git add config/verdict_history.jsonl 2>/dev/null || true
          git add config/alert_state.json 2>/dev/null || true
          git diff --cached --quiet && echo "nessuna variazione" && exit 0
          git commit -m "Aggiornamento dati $(date -u +'%Y-%m-%d %H:%M UTC')"
          # push robusto: riprova con rebase se il remote è avanzato
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rifiutato, riprovo con rebase ($i)…"
            git fetch origin main
            git rebase -X ours origin/main || git rebase --abort
            sleep 3
          done
          echo "push fallito dopo i tentativi" && exit 1
