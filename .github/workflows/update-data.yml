name: Aggiorna dati dashboard

on:
  schedule:
    # RADAR TATTICO — orari ITALIA richiesti: 06:00 · 10:00 · 15:30 · 17:00 · 21:00 · 22:00.
    #   06:00 chiusura mercati asiatici · 10:00 sessione europea + futures USA · 15:30 · 17:00
    #   assestamento post-apertura Wall Street · 21:00 preparazione Power Hour · 22:00.
    # GitHub cron è in UTC: per far cadere questi orari LOCALI tutto l'anno includo sia CEST
    # (estate, UTC+2) sia CET (inverno, UTC+1). L'eventuale run "extra" fuori stagione è
    # innocuo (concurrency group + commit no-op se i dati non cambiano).
    - cron: "0 4 * * *"     # 06:00 CEST
    - cron: "0 5 * * *"     # 06:00 CET
    - cron: "0 8 * * *"     # 10:00 CEST
    - cron: "0 9 * * *"     # 10:00 CET
    - cron: "30 13 * * *"   # 15:30 CEST
    - cron: "30 14 * * *"   # 15:30 CET
    - cron: "0 15 * * *"    # 17:00 CEST
    - cron: "0 16 * * *"    # 17:00 CET
    - cron: "0 19 * * *"    # 21:00 CEST
    - cron: "0 20 * * *"    # 21:00 CET  /  22:00 CEST
    - cron: "0 21 * * *"    # 22:00 CET
    # RUN ORARIO durante la sessione USA (giorni feriali) per non perdere la freschezza di
    # verdetto/technicals/macro mentre Wall Street è aperta. 13:00–22:00 UTC copre le
    # 15:00–23:00 ITALIA sia in CEST (13–21 UTC) sia in CET (14–22 UTC).
    - cron: "0 13-22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  issues: write        # canale UNICO notifiche: GitHub Issue (zero secret)

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - run: python scripts/update_data.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # opzionale: backup prezzi se Yahoo fallisce (registrazione gratuita su tiingo.com)
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}

      # gate di qualità: violazioni matematiche hard (P/E con EPS<0, MCR rotto, stop
      # incoerenti) bloccano il commit dei dati; i degradi di mercato sono solo warning
      - run: python scripts/audit_data.py data/data.json

      # registro verdetti→esiti (v113): logga i candidati del motore e inietta il track
      # record in data.json. BEST-EFFORT: exit 0 sempre + continue-on-error, non deve
      # MAI bloccare il commit dei dati.
      - name: Log verdetti e track record
        run: node scripts/log_verdict.mjs
        continue-on-error: true

      # RED TEAM sui DATI FRESCHI (v116): gli invarianti finanziari del motore vengono
      # verificati su tutte le combinazioni di stato UI PRIMA del commit. Un fallimento
      # qui NON blocca i dati (il bug sarebbe nel codice, non nei prezzi) ma fa scattare
      # l'allarme: mai più scoprire un limite d'ordine folle leggendo il report.
      - name: Red team invarianti motore (dati freschi)
        id: redteam
        run: node scripts/redteam.mjs
        continue-on-error: true
      - name: Allarme red team
        if: steps.redteam.outcome == 'failure'
        # block scalar (>-): il messaggio contiene ": " che in uno scalare YAML piano
        # invalida il file (successo il 11/07: workflow rotto = dati fermi una notte)
        run: >-
          python scripts/notify_alerts.py --custom
          "RED TEAM FALLITO sul run dati — il motore ha violato gli invarianti
          finanziari con i dati freschi. NON usare il report finché non controlli
          la tab Actions."
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # notifiche alert (v113): stop violati / data quality / setup squeeze. Canale UNICO:
      # GitHub Issue (zero secret). WhatsApp/CallMeBot ed email SMTP rimossi (lug 2026).
      # ANTI-FRAGILE: lo script esce sempre 0; continue-on-error come seconda cintura.
      - name: Notifiche alert (best-effort)
        run: python scripts/notify_alerts.py
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit dati aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # file di stato best-effort: possono non esistere ai primi run
          git add config/verdict_history.jsonl 2>/dev/null || true
          git add config/alert_state.json 2>/dev/null || true
          git diff --cached --quiet && echo "nessuna variazione" && exit 0
          git commit -m "Aggiornamento dati $(date -u +'%Y-%m-%d %H:%M UTC')"
          # push robusto: riprova con rebase se il remote è avanzato
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rifiutato, riprovo con rebase ($i)…"
            git fetch origin main
            git rebase -X ours origin/main || git rebase --abort
            sleep 3
          done
          echo "push fallito dopo i tentativi" && exit 1
