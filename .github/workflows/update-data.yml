name: Aggiorna dati dashboard

on:
  schedule:
    # ogni 20 min durante la sessione USA (13:30–21:00 UTC) nei giorni feriali
    - cron: "*/20 13-21 * * 1-5"
    # pre-market / mattina europea
    - cron: "0 6,8,10,12 * * 1-5"
    # una volta nel weekend (news + macro)
    - cron: "0 9 * * 6,0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - run: python scripts/update_data.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit dati aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Aggiornamento dati $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
