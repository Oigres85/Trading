name: Report CIO (Gemini)

# Genera il REPORT DEL COMITATO DI INVESTIMENTO strutturato via Gemini (scripts/cio_report.mjs).
# Gira DOPO il run dati del mattino (i dati freschi devono essere già committati) e su richiesta.
# ANTI-FRAGILE: lo script esce sempre 0; senza GEMINI_API_KEY è un no-op. Il report viene scritto
# solo se supera le invarianti (0<stop<limite≤prezzo, ticker esistente, budget) — altrimenti alert.
on:
  schedule:
    - cron: "15 4 * * 1-5"   # 06:15 CEST (subito dopo il run dati delle 06:00)
    - cron: "15 5 * * 1-5"   # 06:15 CET
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cio-report
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Genera Report CIO (best-effort)
        run: node scripts/cio_report.mjs
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          CIO_CASH_EUR: ${{ secrets.CIO_CASH_EUR }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}

      - name: Commit report CIO
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cio_report.json 2>/dev/null || true
          git diff --cached --quiet && echo "nessun report nuovo" && exit 0
          git commit -m "Report CIO $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rifiutato, riprovo con rebase ($i)…"
            git fetch origin main
            git rebase -X ours origin/main || git rebase --abort
            sleep 3
          done
          echo "push fallito dopo i tentativi" && exit 1
